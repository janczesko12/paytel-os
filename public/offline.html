<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>PAYTEL OS – Offline</title>
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", system-ui, sans-serif;
        background: radial-gradient(120% 100% at 50% 0%, #0f1720 0%, #05070a 60%);
        color: #e6ebf2;
        display: grid; place-items: center; padding: 2rem; text-align: center;
      }
      .card {
        max-width: 26rem;
        padding: 2rem;
        border-radius: 28px;
        background: rgba(255,255,255,0.05);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255,255,255,0.08);
      }
      .dot { width: 12px; height: 12px; border-radius: 999px; background: #ef4444; display: inline-block; margin-right: 8px; box-shadow: 0 0 12px #ef4444; }
      h1 { font-size: 1.5rem; margin: 0.5rem 0; letter-spacing: -0.02em; }
      p { color: #9aa4b2; line-height: 1.5; }
      button {
        margin-top: 1.5rem; width: 100%; padding: 0.9rem 1rem; border-radius: 16px; border: 0;
        background: linear-gradient(180deg, #10b981, #059669); color: white; font-weight: 600; font-size: 1rem;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div><span class="dot"></span>Brak połączenia</div>
      <h1>Jesteś offline</h1>
      <p>PAYTEL OS potrzebuje internetu, aby skanować i pobierać produkty. Sprawdź połączenie i spróbuj ponownie.</p>
      <button onclick="location.reload()">Spróbuj ponownie</button>
    </div>
  </body>
</html>
